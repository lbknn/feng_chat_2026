# ============================================
# Server 102 Configuration
# IP: 192.168.50.102
# ============================================

# Application Name
spring.application.name=fengbushi-chat

# Server Port
server.port=8080

# ============================================
# MySQL Configuration (Shared)
# ============================================
spring.datasource.url=jdbc:mysql://192.168.50.1:3306/fengbushi?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=gyq123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ============================================
# MongoDB Configuration (Local to 102)
# ============================================
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=fengbushi

# ============================================
# Consul Configuration (Register to Linux LB)
# ============================================
spring.cloud.consul.host=192.168.50.100
spring.cloud.consul.port=8500
spring.cloud.consul.enabled=true
spring.cloud.consul.discovery.enabled=true
spring.cloud.consul.discovery.prefer-ip-address=true
spring.cloud.consul.discovery.ip-address=192.168.50.102
spring.cloud.consul.discovery.instance-id=fengbushi-chat-102-8080
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s
spring.cloud.consul.discovery.health-check-timeout=5s

# ============================================
# Actuator for Health Check
# ============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ============================================
# WebSocket Configuration
# ============================================
spring.websocket.enabled=true

# ============================================
# File Upload Configuration
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# Logging
# ============================================
logging.level.org.springframework.cloud.consul=WARN
logging.level.root=INFO
