<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>风不止聊天</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 登录/注册页面 -->
<div id="auth-page" class="page active">
    <div class="auth-container">
        <div class="auth-header">
            <h1>💬 风不止</h1>
            <p>实时聊天应用</p>
        </div>

        <div id="login-form" class="auth-form active">
            <h2>登录</h2>
            <input type="text" id="login-username" placeholder="用户名" autocomplete="username">
            <input type="password" id="login-password" placeholder="密码" autocomplete="current-password">
            <button onclick="handleLogin()" class="btn-primary">登录</button>
            <p class="auth-switch">还没有账号? <a onclick="showRegister()">立即注册</a></p>
        </div>

        <div id="register-form" class="auth-form">
            <h2>注册</h2>
            <input type="text" id="reg-username" placeholder="用户名" autocomplete="username">
            <input type="text" id="reg-nickname" placeholder="昵称(可选)" autocomplete="name">
            <input type="password" id="reg-password" placeholder="密码" autocomplete="new-password">
            <input type="password" id="reg-confirm-password" placeholder="确认密码" autocomplete="new-password">
            <button onclick="handleRegister()" class="btn-primary">注册</button>
            <p class="auth-switch">已有账号? <a onclick="showLogin()">立即登录</a></p>
        </div>
    </div>
</div>

<!-- 聊天主页面 -->
<div id="chat-page" class="page">
    <div id="add-friend-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加朋友</h3>
                <button onclick="closeAddFriendModal()" class="btn-close">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>用户ID</label>
                    <input type="text" id="add-friend-id" placeholder="输入对方用户ID">
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="closeAddFriendModal()" class="btn-cancel">取消</button>
                <button onclick="searchUserById()" class="btn-primary">搜索</button>
            </div>
        </div>
    </div>

    <div id="create-group-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>创建群聊</h3>
                <button onclick="closeCreateGroupModal()" class="btn-close">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>群名称</label>
                    <input type="text" id="create-group-name" placeholder="请输入群名称" maxlength="50">
                </div>
                <div class="form-group">
                    <label>选择成员（可多选）</label>
                    <div id="group-member-select" style="max-height: 200px; overflow-y: auto; border: 1px solid #E5E7EB; border-radius: 8px; padding: 10px;">
                        <!-- 动态加载好友列表 -->
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="closeCreateGroupModal()" class="btn-cancel">取消</button>
                <button onclick="handleCreateGroup()" class="btn-primary">创建</button>
            </div>
        </div>
    </div>

    <div id="edit-group-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>群聊设置</h3>
                <button onclick="closeEditGroupModal()" class="btn-close">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>群头像</label>
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <div id="edit-group-avatar-preview" class="contact-avatar" style="width: 60px; height: 60px; font-size: 24px; cursor: pointer;" onclick="triggerGroupAvatarUpload()">
                            👥
                        </div>
                        <div>
                            <button onclick="triggerGroupAvatarUpload()" class="btn-cancel" style="padding: 8px 16px; font-size: 13px;">更换头像</button>
                            <input type="file" id="group-avatar-upload" accept="image/*" style="display: none;" onchange="handleGroupAvatarUpload(event)">
                            <p style="font-size: 12px; color: #999; margin-top: 5px;">点击头像或按钮上传</p>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>群名称</label>
                    <input type="text" id="edit-group-name" placeholder="请输入群名称" maxlength="50">
                </div>
                <div class="form-group">
                    <label>群公告</label>
                    <textarea id="edit-group-announcement" placeholder="请输入群公告" rows="3" style="width: 100%; padding: 10px; border: 1px solid #E5E7EB; border-radius: 8px; resize: vertical;"></textarea>
                </div>
                <div class="form-group">
                    <label>群成员</label>
                    <div id="edit-group-members-list" style="max-height: 150px; overflow-y: auto; padding: 10px; background: #f9fafb; border-radius: 8px;">
                        <!-- 动态加载成员列表 -->
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="closeEditGroupModal()" class="btn-cancel">关闭</button>
                <button onclick="saveGroupSettings()" class="btn-primary">保存</button>
            </div>
        </div>
    </div>

    <div id="group-avatar-modal" class="modal" style="display: none;" onclick="closeGroupAvatarModal()">
        <div style="background: transparent; box-shadow: none;" onclick="event.stopPropagation();">
            <img id="group-avatar-large" src="" alt="群头像" style="max-width: 80vw; max-height: 80vh; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.3);">
            <button onclick="closeGroupAvatarModal()" style="position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 24px; cursor: pointer;">×</button>
        </div>
    </div>

    <div id="profile-modal" class="modal profile-modal-full" style="display: none;">
        <div class="profile-container">
            <div class="profile-left">
                <div class="profile-header">
                    <button onclick="closeProfileModal()" class="btn-close-white">×</button>
                </div>
                <div class="profile-avatar-section">
                    <div class="profile-avatar-wrapper">
                        <div class="profile-avatar-large" id="profile-avatar-preview">
                            <img id="profile-avatar-img" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: none;">
                            <span id="profile-avatar-text" style="font-size: 60px; color: white;">👤</span>
                        </div>
                        <div class="profile-avatar-actions">
                            <button onclick="triggerAvatarUpload()" class="btn-avatar-action" title="更换头像">📷 更换</button>
                            <button onclick="removeAvatar()" class="btn-avatar-action btn-danger" title="删除头像" id="btn-remove-avatar" style="display: none;">🗑️ 删除</button>
                        </div>
                        <input type="file" id="avatar-upload" accept="image/jpeg,image/png,image/gif,image/webp" style="display: none;" onchange="handleAvatarUpload(event)">
                    </div>
                    <div class="avatar-tips"><small>支持 JPG、PNG、GIF、WEBP 格式，大小不超过 2MB</small></div>
                </div>
                <div class="profile-quick-info">
                    <h2 id="profile-display-name">用户名</h2>
                    <p class="profile-id">ID: <span id="profile-display-id">-</span></p>
                </div>
            </div>

            <div class="profile-right">
                <div class="profile-section">
                    <h3 class="section-title">基本信息</h3>
                    <div class="info-item">
                        <label>昵称</label>
                        <input type="text" id="profile-nickname" placeholder="请输入昵称" maxlength="20">
                    </div>
                    <div class="info-item">
                        <label>用户名</label>
                        <input type="text" id="profile-username" readonly>
                    </div>
                    <div class="info-item">
                        <label>用户ID</label>
                        <input type="text" id="profile-userid" readonly>
                    </div>
                </div>

                <div class="profile-section">
                    <h3 class="section-title">账号信息</h3>
                    <div class="info-item">
                        <label>注册时间</label>
                        <input type="text" id="profile-register-time" readonly>
                    </div>
                    <div class="info-item">
                        <label>账号状态</label>
                        <input type="text" value="正常使用中" readonly>
                    </div>
                </div>

                <div class="profile-actions">
                    <button onclick="closeProfileModal()" class="btn-cancel-large">取消</button>
                    <button onclick="saveProfile()" class="btn-primary-large">保存修改</button>
                </div>
            </div>
        </div>
    </div>

    <div id="friend-profile-modal" class="modal profile-modal-full" style="display: none;">
        <div class="profile-container">
            <div class="profile-left">
                <div class="profile-header">
                    <button onclick="closeFriendProfileModal()" class="btn-close-white">×</button>
                </div>
                <div class="profile-avatar-section">
                    <div class="profile-avatar-wrapper">
                        <div class="profile-avatar-large" id="friend-profile-avatar-preview">
                            <img id="friend-profile-avatar-img" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: none;">
                            <span id="friend-profile-avatar-text" style="font-size: 60px; color: white;">👤</span>
                        </div>
                    </div>
                </div>
                <div class="profile-quick-info">
                    <h2 id="friend-profile-display-name">好友昵称</h2>
                    <p class="profile-id">ID: <span id="friend-profile-display-id">-</span></p>
                    <div class="friend-status-badge" id="friend-status-badge">离线</div>
                </div>
            </div>

            <div class="profile-right">
                <div class="profile-section">
                    <h3 class="section-title">基本信息</h3>
                    <div class="info-item">
                        <label>昵称</label>
                        <input type="text" id="friend-profile-nickname" readonly>
                    </div>
                    <div class="info-item">
                        <label>用户ID</label>
                        <input type="text" id="friend-profile-username" readonly>
                    </div>
                    <div class="info-item">
                        <label>我的备注</label>
                        <input type="text" id="friend-profile-remark" placeholder="点击设置备注" maxlength="20">
                        <button onclick="saveFriendRemark()" class="btn-save-remark" id="btn-save-remark" style="display: none;">保存</button>
                    </div>
                </div>

                <div class="profile-section">
                    <h3 class="section-title">好友信息</h3>
                    <div class="info-item">
                        <label>来源</label>
                        <input type="text" value="通过搜索添加" readonly>
                    </div>
                    <div class="info-item">
                        <label>添加时间</label>
                        <input type="text" id="friend-add-time" readonly>
                    </div>
                </div>

                <div class="profile-actions">
                    <button onclick="closeFriendProfileModal()" class="btn-cancel-large">关闭</button>
                    <button onclick="sendFriendRequestFromProfile()" class="btn-primary-large" id="btn-send-request">📨 发送好友申请</button>
                </div>
            </div>
        </div>
    </div>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="user-info" onclick="showProfileModal()" style="cursor: pointer;">
                <div class="avatar" id="current-user-avatar">
                    <img id="current-user-avatar-img" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: none;">
                    <span id="current-user-avatar-text">👤</span>
                </div>
                <div class="user-details">
                    <div class="username" id="current-username">用户</div>
                </div>
            </div>
            <div class="header-actions">
                <button onclick="showAddFriendModal()" class="btn-icon" title="添加朋友">➕</button>
                <button onclick="logout()" class="btn-icon" title="退出登录">⋮</button>
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="search-input" placeholder="🔍 搜索" oninput="handleSearch()">
        </div>

        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('friends')">💬 消息</button>
            <button class="tab-btn" onclick="switchTab('requests')">🔔 好友申请</button>
            <button class="tab-btn" onclick="switchTab('groups')">👥 群组</button>
        </div>

        <div id="friends-list" class="contact-list active"></div>
        <div id="requests-list" class="contact-list">
            <div style="padding: 20px; text-align: center; color: #999;" id="no-requests-tip">
                <div style="font-size: 48px; margin-bottom: 10px;">📭</div>
                <div>暂无好友申请</div>
            </div>
        </div>
        <div id="groups-list" class="contact-list">
            <div style="padding: 10px;" id="create-group-btn-container">
                <button onclick="showCreateGroupModal()" class="btn-primary" style="width: 100%; padding: 12px; font-size: 14px;">➕ 创建群聊</button>
            </div>
        </div>
    </div>

    <div id="chat-area" class="chat-area">
        <div id="no-chat-selected" class="no-chat-selected">
            <div class="empty-state">
                <div class="icon">💬</div>
                <h3>欢迎使用风不止</h3>
                <p>选择一个联系人开始聊天<br>或者添加新朋友</p>
            </div>
        </div>

        <div id="chat-window" class="chat-window">
            <div class="chat-header">
                <button class="btn-icon mobile-only" onclick="toggleSidebar()">☰</button>
                <div class="chat-info">
                    <div class="avatar" id="chat-avatar" style="cursor: pointer;" onclick="showGroupAvatarModal()">👤</div>
                    <div class="chat-details">
                        <div class="chat-name" id="chat-name">聊天对象</div>
                        <div class="chat-status" id="chat-status"></div>
                    </div>
                </div>
                <button class="btn-icon" title="群设置" id="btn-group-settings" style="display: none;" onclick="showEditGroupModal()">⚙️</button>
            </div>

            <div id="message-list" class="message-list"></div>

            <div class="input-area">
                <div id="emoji-picker" class="emoji-picker" style="display: none;">
                    <div class="emoji-grid" id="emoji-grid"></div>
                </div>
                <div class="input-toolbar">
                    <button class="btn-icon" title="表情" onclick="toggleEmojiPicker()">😊</button>
                    <button class="btn-icon" title="文件" onclick="triggerFileSelect()">📁</button>
                </div>
                <div class="input-box">
                        <textarea
                                id="message-input"
                                placeholder="输入消息..."
                                rows="1"
                                onkeydown="handleInputKeydown(event)"
                                oninput="autoResize(this)"
                        ></textarea>
                    <button onclick="sendMessage()" class="btn-send">发送</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/js/api.js?v=3"></script>
<script src="/js/websocket.js?v=3"></script>
<script src="/js/app.js?v=3"></script>
</body>
</html>
